<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <aside class="sidebar">
        <h2 style="color:var(--primary)">ADMIN</h2>
        <nav>
            <a href="/" style="color:white; text-decoration:none;">🏠 Accueil</a><br><br>
            <a href="/logout" style="color:var(--primary); text-decoration:none;">🚪 Déconnexion</a>
        </nav>
    </aside>

    <main class="main-content">
        <h1>Dashboard <span style="color:var(--secondary)">Statistiques</span></h1>
        
        <div class="stats-row">
            <div class="stat-card"><div>Total</div><div class="stat-value">{{total}}</div></div>
            <div class="stat-card"><div>Moyenne Générale</div><div class="stat-value">{{moy_gen}}/20</div></div>
            <div class="stat-card"><div>Major</div><div class="stat-value" style="font-size:1rem">{{meilleur}}</div></div>
        </div>

        <div style="margin-bottom:20px;">
            <a href="/export/csv" class="btn-export csv">Export CSV</a>
            <a href="/export/excel" class="btn-export excel">Export EXCEL</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nom</th><th>Filière</th><th>Moyenne</th><th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for s in students %}
                <tr>
                    <td>{{s.nom}}</td>
                    <td>{{s.filiere}}</td>
                    <td style="color:var(--secondary); font-weight:bold;">{{s.moy}}</td>
                    <td>
                        <form action="/delete/{{s.id}}" method="POST">
                            <button style="background:none; border:none; color:var(--primary); cursor:pointer;">Supprimer</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>
</body>
</html>
